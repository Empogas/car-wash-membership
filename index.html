<!DOCTYPE html>
<html>
<head>
  <title>Emporium Car Wash</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f4f4f4;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      max-width: 400px;
      margin: auto;
      box-shadow: 0 2px 10px #ccc;
    }

    h1 {
      text-align: center;
    }

    .active {
      color: green;
      font-size: 28px;
      font-weight: bold;
    }

    .expired {
      color: red;
      font-size: 28px;
      font-weight: bold;
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      font-size: 16px;
    }
  </style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<div class="card">

<h1>🚗 Emporium Car Wash</h1>

<div id="login">
  <h2>Employee Login</h2>

  <input id="email" placeholder="Email">

  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <div id="loginMessage"></div>
</div>


<div id="app" style="display:none">

  <h2>Member Lookup</h2>

  <input id="customerID" placeholder="Customer ID">

  <button onclick="lookupMember()">Search</button>

  <button onclick="logout()">Logout</button>

  <div id="result"></div>

</div>

</div>


<script>

const SUPABASE_URL = "https://yqrgleruaxcjqvgnetam.supabase.co";
const SUPABASE_KEY = "sb_publishable_vI4waNrvpVZ_iz65H4ZxXw_VKGSnhMF";

const supabaseClient = supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);


async function login() {

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await supabaseClient.auth.signInWithPassword({
    email: email,
    password: password
  });

  if (error) {
    document.getElementById("loginMessage").innerHTML = error.message;
    return;
  }

  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display = "block";

}


async function logout() {

  await supabaseClient.auth.signOut();

  document.getElementById("app").style.display = "none";
  document.getElementById("login").style.display = "block";

}


async function lookupMember() {

  let id = document.getElementById("customerID").value;

  const { data, error } = await supabaseClient
    .from("Members")
    .select("*")
    .eq("customer_id", id)
    .single();


  if (error || !data) {

    document.getElementById("result").innerHTML =
    "<hr><div class='expired'>NOT FOUND</div>";

    return;
  }

const today = new Date();
const expiration = new Date(data.expires_at);

const difference = expiration - today;

const daysRemaining = Math.ceil(
  difference / (1000 * 60 * 60 * 24)
);
 document.getElementById("result").innerHTML = `

<hr>

<div class="${daysRemaining > 0 ? "active" : "expired"}">
${daysRemaining > 0 ? "🟢 ACTIVE MEMBER" : "🔴 EXPIRED"}
</div>

<p><b>${data.first_name} ${data.last_name}</b></p>

<p>Plate: ${data.license_plate}</p>

<p>Vehicle: ${data.vehicle_color} ${data.vehicle_make} ${data.vehicle_model}</p>

<p>Expires: ${data.expires_at}</p>
<p>⏳ ${daysRemaining > 0 ? daysRemaining + " days remaining" : "Expired"}</p>

`;

}
window.onload = function(){

  const params = new URLSearchParams(window.location.search);

  const id = params.get("id");

  if(id){

    document.getElementById("customerID").value = id;

    setTimeout(() => {
      lookupMember();
    }, 1000);

  }

}
</script>

</body>
</html>
