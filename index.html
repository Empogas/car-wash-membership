<!DOCTYPE html>
<html>
<head>
<head>
  <title>Emporium Car Wash</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/members.js"></script>
<script src="js/scanner.js"></script>
<script src="js/app.js"></script>

</head>

<body>

<div class="card">

<h1>🚗 Emporium Car Wash</h1>

<div id="login">
  <h2>Employee Login</h2>

  <input id="email" placeholder="Email">

  <input id="password" type="password" placeholder="Password">
<label>
  <input type="checkbox" id="rememberMe" checked>
  Stay signed in
</label>
  <button onclick="login()">Login</button>

  <div id="loginMessage"></div>
</div>


<div id="app" style="display:none">

  <h2>Member Lookup</h2>

<input id="customerID" placeholder="Customer ID">

<button onclick="lookupMember()">Search</button>

<button onclick="startScanner()">📷 Scan QR Code</button>

<div id="reader" style="width:300px;margin-top:20px;"></div>

  <button onclick="logout()">Logout</button>

  <div id="result"></div>
</body>
</html>
