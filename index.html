<!DOCTYPE html>
<html>
<head>
  <title>Emporium Memberships</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f4f4f4;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      max-width: 400px;
      margin: auto;
      box-shadow: 0 2px 10px #ccc;
    }

    h1 {
      text-align: center;
    }

    .active {
      color: green;
      font-size: 28px;
      font-weight: bold;
    }

    .expired {
      color: red;
      font-size: 28px;
      font-weight: bold;
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      font-size: 16px;
    }
  </style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<div class="card">

<h1>🚗 Car Wash</h1>

<div id="login">
  <h2>Employee Login</h2>

  <input id="email" placeholder="Email">

  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <div id="loginMessage"></div>
</div>


<div id="app" style="display:none">

  <h2>Member Lookup</h2>

  <input id="customerID" placeholder="Customer ID">

  <button onclick="lookupMember()">Search</button>

  <button onclick="logout()">Logout</button>

  <div id="result"></div>

</div>

</div>


<script>

const SUPABASE_URL = "https://yqrgleruaxcjqvgnetam.supabase.co";
const SUPABASE_KEY = "sb_publishable_vI4waNrvpVZ_iz65H4ZxXw_VKGSnhMF";

const supabaseClient = supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);


async function login(){

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;


const {data,error} = await supabaseClient.auth.signInWithPassword({
email: email,
password: password
});


if(error){

document.getElementById("loginMessage").innerHTML =
"Login failed";

return;

}


document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";


}


async function logout(){

await supabaseClient.auth.signOut();

document.getElementById("app").style.display="none";
document.getElementById("login").style.display="block";

}

  async function lookupMember() {
  alert("Button works!");
}

  let id = document.getElementById("customerID").value;

  const { data, error } = await supabaseClient
    .from("Members")
    .select("*")
    .eq("customer_id", id)
    .single();

  if (error || !data) {
    document.getElementById("result").innerHTML = `
      <hr>
      <div class="expired">NOT FOUND</div>
    `;
    return;
  }

  document.getElementById("result").innerHTML = `
    <hr>
    <div class="${data.status.toLowerCase()}">${data.status}</div>
    <p><b>${data.first_name} ${data.last_name}</b></p>
    <p>Membership: ${data.membership}</p>
    <p>Plate: ${data.license_plate}</p>
    <p>Expires: ${data.expires_at}</p>
  `;
}
</script>

</body>
</html>
