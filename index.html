<!DOCTYPE html>
<html>
<head>
<head>
  <title>Emporium Car Wash</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
</head>

<body>

<div class="card">

<h1>🚗 Emporium Car Wash</h1>

<div id="login">
  <h2>Employee Login</h2>

  <input id="email" placeholder="Email">

  <input id="password" type="password" placeholder="Password">
<label>
  <input type="checkbox" id="rememberMe" checked>
  Stay signed in
</label>
  <button onclick="login()">Login</button>

  <div id="loginMessage"></div>
</div>


<div id="app" style="display:none">

  <h2>Member Lookup</h2>

<input id="customerID" placeholder="Customer ID">

<button onclick="lookupMember()">Search</button>

<button onclick="startScanner()">📷 Scan QR Code</button>

<div id="reader" style="width:300px;margin-top:20px;"></div>

  <button onclick="logout()">Logout</button>

  <div id="result"></div>

</div>

</div>


<script>

const SUPABASE_URL = "https://yqrgleruaxcjqvgnetam.supabase.co";
const SUPABASE_KEY = "sb_publishable_vI4waNrvpVZ_iz65H4ZxXw_VKGSnhMF";

const supabaseClient = supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);


async function login() {

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const remember = document.getElementById("rememberMe").checked;

const { data, error } = await supabaseClient.auth.signInWithPassword({
  email: email,
  password: password,
  options: {
    persistSession: remember
  }
});

  if (error) {
    document.getElementById("loginMessage").innerHTML = error.message;
    return;
  }

  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display = "block";

}


async function logout() {

  await supabaseClient.auth.signOut();

  document.getElementById("app").style.display = "none";
  document.getElementById("login").style.display = "block";

}


async function lookupMember() {

  let id = document.getElementById("customerID").value;

  const { data, error } = await supabaseClient
    .from("Members")
    .select("*")
    .eq("customer_id", id)
    .single();


  if (error || !data) {

    document.getElementById("result").innerHTML =
    "<hr><div class='expired'>NOT FOUND</div>";

    return;
  }

const today = new Date();
const expiration = new Date(data.expires_at);

const difference = expiration - today;

const daysRemaining = Math.ceil(
  difference / (1000 * 60 * 60 * 24)
);
document.getElementById("result").innerHTML = `

<div class="membership-card">

<img src="emporium-logo.png" width="250">

<h2>${data.first_name} ${data.last_name}</h2>

<hr>

<div class="${daysRemaining > 0 ? "active" : "expired"}">
${daysRemaining > 0 ? "🟢 ACTIVE MEMBER" : "🔴 EXPIRED"}
</div>

<p>Plate: ${data.license_plate}</p>

<p>Vehicle: ${data.vehicle_color} ${data.vehicle_make} ${data.vehicle_model}</p>

<p>Expires: ${data.expires_at}</p>

<p>⏳ ${daysRemaining > 0 ? daysRemaining + " days remaining" : "Expired"}</p>

<img class="card-qr" src="${data.qr_image}" width="150">

</div>

`;
  
}
window.onload = function(){

  const params = new URLSearchParams(window.location.search);

  const id = params.get("id");

  if(id){

    document.getElementById("customerID").value = id;

    setTimeout(() => {
      lookupMember();
    }, 1000);

  }

}

function startScanner(){

const scanner = new Html5Qrcode("reader");

scanner.start(
  { facingMode: "environment" },
  {
    fps: 10,
    qrbox: 250
  },
  (decodedText)=>{

    const url = new URL(decodedText);

    const id = url.searchParams.get("id");

    document.getElementById("customerID").value = id;

    scanner.stop();

    lookupMember();

  }
);

}

supabaseClient.auth.getSession().then(({ data }) => {

  if (data.session) {

    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";

  }

});

</script>

</body>
</html>
